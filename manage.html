<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
    <title>管理书签｜LZN导航</title><link rel="stylesheet" href="assets/style.css">
  </head>
  <body>
    <main class="manage-page shell">
      <header class="site-header"><a class="brand" href="index.html"><span class="brand-mark">L</span><span>LZN导航</span></a><a class="admin-link" href="index.html">返回导航页</a></header>
      <section class="manage-hero">
        <p class="eyebrow">BOOKMARK MANAGEMENT</p><h1>管理书签</h1>
        <p>请先登录 GitHub。只有仓库拥有者提交的请求会自动写入书签并更新网站。</p>
      </section>
      <section class="manage-actions" id="manage-actions">
        <a class="manage-card" data-form="add"><strong>添加书签</strong><span>填写名称、网址、分类和描述</span><b>开始添加 ↗</b></a>
        <a class="manage-card" data-form="edit"><strong>修改书签</strong><span>按名称找到现有书签并更新</span><b>开始修改 ↗</b></a>
        <a class="manage-card" data-form="delete"><strong>删除书签</strong><span>输入要删除的书签名称</span><b>开始删除 ↗</b></a>
      </section>
      <p class="manage-note" id="manage-note">部署到 GitHub Pages 后，管理链接会自动指向对应仓库的表单。</p>
    </main>
    <script src="assets/config.js"></script><script src="assets/manage.js"></script>
  </body>
</html>
