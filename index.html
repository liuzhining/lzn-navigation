<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="LZN导航：常用网站，一页抵达。">
    <title>LZN导航｜常用网站，一页抵达</title>
    <link rel="stylesheet" href="assets/style.css"><link rel="stylesheet" href="assets/fallback.css">
  </head>
  <body>
    <main>
      <header class="site-header shell">
        <a class="brand" href="/" aria-label="LZN导航首页"><span class="brand-mark">L</span><span>LZN导航</span></a>
        <a class="admin-link" id="admin-link" href="manage.html">管理书签</a>
      </header>
      <section class="hero shell">
        <p class="eyebrow">YOUR QUIET CORNER OF THE WEB</p>
        <h1>常用网站，<em>一页抵达</em></h1>
        <p>把散落在网络里的常用去处，收进一张安静、好找、随时可分享的页面。</p>
      </section>
      <section class="directory shell" aria-label="网址导航">
        <div class="search-wrap"><span aria-hidden="true">⌕</span><label class="sr-only" for="site-search">搜索网站</label><input id="site-search" type="search" placeholder="搜索名称、描述或分类…"><kbd>⌘ K</kbd></div>
        <nav class="filters" id="filters" aria-label="分类筛选"></nav>
        <div class="link-grid" id="link-grid"></div>
        <div class="empty-state" id="empty-state" hidden><span>⌕</span><strong>没有找到相关网站</strong><p>换个关键词，或选择其他分类试试。</p></div>
      </section>
      <footer class="shell footer"><span>LZN导航 · 为日常留一条捷径</span><a id="footer-admin" href="manage.html">管理入口</a></footer>
    </main>
    <script src="assets/config.js"></script>
    <script src="assets/app.js"></script>
  </body>
</html>
