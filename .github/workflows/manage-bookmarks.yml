name: Manage bookmarks
on:
  issues:
    types: [opened]
permissions:
  contents: write
  issues: write
  pages: write
  id-token: write
jobs:
  update:
    if: startsWith(github.event.issue.title, '【书签')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Update bookmarks
        env:
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_AUTHOR_ASSOCIATION: ${{ github.event.issue.author_association }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
        run: node .github/scripts/manage-bookmarks.mjs
      - name: Build updated site
        run: |
          mkdir _site
          cp -R index.html manage.html assets data _site/
          printf 'window.LZN_CONFIG={repository:"%s"};' "${{ github.repository }}" > _site/assets/config.js
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - uses: actions/deploy-pages@v4
